spring:
  application:
    name: AREcommerceApi
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/arecommerce}
  mongodb:
    embedded:
      version: 6.0.5

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 6.0.5

yandex-s3:
  endpoint: https://storage.yandexcloud.net
  region: ru-central1
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  buckets:
    models: ar-models
    images: product-images

admin:
  api-key: ${ADMIN_API_KEY:}
